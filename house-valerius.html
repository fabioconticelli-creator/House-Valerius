<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>House Valerius</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0e0b14;
  --bg2:    #13101a;
  --bg3:    #1a1624;
  --bg4:    #201c2e;
  --panel:  #110e18;
  --border: #2a2040;
  --border2:#332848;
  --red:    #c0392b;
  --red2:   #e74c3c;
  --red-dim:#7a1a1a;
  --red-glow:rgba(192,57,43,0.4);
  --purple: #7c3aed;
  --purple2:#a855f7;
  --purple-dim:#3b1f6e;
  --purple-glow:rgba(124,58,237,0.3);
  --text:   #e8e0f0;
  --text-dim:#8a7fa0;
  --text-muted:#4a4060;
  --green:  #22c55e;
  --yellow: #eab308;
  --blue:   #3b82f6;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}
.app{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:260px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;}
.sidebar-header{padding:22px 18px 18px;border-bottom:1px solid var(--border);}
.campaign-logo{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.campaign-orb{width:32px;height:32px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--red2),var(--red-dim));box-shadow:0 0 16px var(--red-glow);flex-shrink:0;}
.campaign-title{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text);letter-spacing:.04em;line-height:1.2;}
.campaign-sub{font-size:11px;color:var(--text-muted);letter-spacing:.08em;margin-top:2px;}
.sidebar-section{padding:14px 0 6px;}
.sec-label{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);padding:0 18px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;transition:all .18s;font-size:13px;font-weight:400;color:var(--text-dim);border-left:2px solid transparent;user-select:none;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04);border-left-color:var(--border2);}
.nav-item.active{color:var(--red2);background:rgba(192,57,43,.1);border-left-color:var(--red);font-weight:500;}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.player-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.divider{height:1px;background:var(--border);margin:6px 18px;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);gap:10px;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.menu-toggle{display:none;background:none;border:1px solid var(--border2);border-radius:8px;color:var(--text-dim);font-size:16px;width:36px;height:36px;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.topbar-orb{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--red2),var(--red-dim));box-shadow:0 0 10px var(--red-glow);flex-shrink:0;}
.page-title{font-family:'Cinzel',serif;font-size:16px;font-weight:600;color:var(--red2);letter-spacing:.06em;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn-dm{font-size:12px;font-weight:500;padding:6px 14px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .18s;letter-spacing:.04em;}
.btn-dm:hover{border-color:var(--red-dim);color:var(--text);}
.btn-dm.active{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 0 12px var(--red-glow);}
.btn-add{font-size:12px;font-weight:600;padding:6px 14px;border-radius:8px;background:var(--red);color:#fff;border:none;cursor:pointer;transition:all .18s;letter-spacing:.04em;}
.btn-add:hover{background:var(--red2);}
.content{flex:1;overflow-y:auto;padding:20px;}

/* ── CARDS hidden edit ── */
.card-actions{display:none;gap:6px;margin-top:10px;padding-top:9px;border-top:1px solid var(--border);}
.dm-mode .card-actions{display:flex;}
.btn-edit{font-size:11px;padding:4px 10px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .18s;}
.btn-edit:hover{border-color:var(--red-dim);color:var(--red2);}
.btn-delete{font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .18s;}
.btn-delete:hover{border-color:var(--red-dim);color:var(--red2);}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{font-size:40px;opacity:.3;margin-bottom:12px;}
.empty-title{font-family:'Cinzel',serif;font-size:14px;color:var(--text-muted);}

/* ── SESSIONS ── */
.sessions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.session-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .18s;position:relative;overflow:hidden;cursor:pointer;}
.session-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--red-dim);border-radius:12px 0 0 12px;transition:background .18s;}
.session-card:hover{border-color:var(--border2);background:var(--bg3);}
.session-card:hover::before{background:var(--red);}
.session-num{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--red-dim);}
.session-title{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--text);margin:5px 0 6px;}
.session-excerpt{font-size:13px;color:var(--text-dim);line-height:1.55;font-style:italic;}
.session-date{font-size:11px;color:var(--text-muted);margin-top:8px;}

/* ── NPC LIST ── */
.npc-grid{display:flex;flex-direction:column;gap:10px;}
.npc-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .18s;}
.npc-row:hover{border-color:var(--border2);background:var(--bg3);}
.npc-portrait{width:48px;height:48px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;}
.npc-portrait img{width:100%;height:100%;object-fit:cover;}
.npc-info{flex:1;min-width:0;}
.npc-name{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--text);}
.npc-role-txt{font-size:12px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.npc-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border:1px solid;border-radius:5px;}
.tag.alleato{border-color:#166534;color:#4ade80;}
.tag.neutrale{border-color:#713f12;color:#fbbf24;}
.tag.nemico{border-color:#7f1d1d;color:#f87171;}
.tag.sconosciuto{border-color:#1e3a5f;color:#60a5fa;}
.tag.vivo{border-color:#166534;color:#4ade80;}
.tag.morto{border-color:#7f1d1d;color:#f87171;}

/* ── NPC PANEL ── */
.npc-panel{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;}
.npc-panel.open{pointer-events:all;}
.npc-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.7);opacity:0;transition:opacity .25s;backdrop-filter:blur(4px);}
.npc-panel.open .npc-backdrop{opacity:1;}
.npc-sheet{position:absolute;bottom:0;left:0;right:0;max-height:92vh;background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border2);overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.npc-panel.open .npc-sheet{transform:translateY(0);}
.npc-sheet-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px;}
.npc-sheet-name{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--red2);}
.npc-close{background:none;border:none;font-size:22px;color:var(--text-dim);cursor:pointer;padding:4px;line-height:1;}
.npc-divider{display:flex;align-items:center;justify-content:center;padding:4px 0 16px;}
.npc-divider::before{content:'✦';color:var(--red-dim);font-size:12px;}
.npc-img-wrap{padding:0 20px 16px;}
.npc-img-wrap img{width:100%;border-radius:12px;border:1px solid var(--border2);display:block;max-height:340px;object-fit:cover;}
.npc-img-placeholder{width:100%;height:200px;background:var(--bg3);border-radius:12px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:56px;}
.npc-sheet-body{padding:0 20px 32px;}
.npc-sheet-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.npc-sheet-ruolo{font-size:13px;color:var(--text-dim);margin-bottom:6px;font-style:italic;}
.npc-sheet-primo{font-size:13px;margin-bottom:14px;}<br>
.npc-sheet-primo span{color:var(--red2);}
.npc-sheet-desc{font-size:15px;color:var(--text);line-height:1.75;}

/* ── WORLD ── */
.world-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.world-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .18s;}
.world-card:hover{border-color:var(--border2);}
.world-card-img{height:76px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:30px;border-bottom:1px solid var(--border);}
.world-card-body{padding:11px;}
.world-card-title{font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:var(--text);}
.world-card-sub{font-size:11px;color:var(--text-dim);font-style:italic;margin-top:3px;line-height:1.4;}

/* ── FAZIONI ── */
.faction-list{display:flex;flex-direction:column;gap:10px;}
.faction-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;gap:12px;transition:all .18s;}
.faction-card:hover{border-color:var(--border2);}
.faction-icon{width:44px;height:44px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.faction-name{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--text);}
.faction-desc{font-size:12px;color:var(--text-dim);font-style:italic;margin:3px 0 6px;line-height:1.5;}
.influence-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:5px;}
.influence-fill{height:100%;background:linear-gradient(90deg,var(--red-dim),var(--red2));}
.influence-lbl{font-size:10px;color:var(--text-muted);margin-top:3px;}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:26px;}
.timeline::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,var(--red-dim),transparent);}
.tl-item{position:relative;padding:0 0 20px 16px;}
.tl-item::before{content:'';position:absolute;left:-21px;top:5px;width:8px;height:8px;border:1px solid var(--red-dim);background:var(--bg);transform:rotate(45deg);}
.tl-date{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--red-dim);margin-bottom:3px;}
.tl-title{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;}
.tl-desc{font-size:13px;color:var(--text-dim);font-style:italic;line-height:1.55;}

/* ── ARCANO ── */
.arcane-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.arcane-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;transition:all .18s;}
.arcane-card:hover{border-color:var(--border2);}
.arcane-icon{font-size:28px;margin-bottom:8px;}
.arcane-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.arcane-school{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--red-dim);margin-bottom:7px;}
.arcane-desc{font-size:12px;color:var(--text-dim);font-style:italic;line-height:1.5;}

/* ── PARTY LIST ── */
.party-list{display:flex;flex-direction:column;gap:10px;}
.party-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .18s;}
.party-row:hover{border-color:var(--border2);background:var(--bg3);}
.party-row-avatar{width:44px;height:44px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--bg3);flex-shrink:0;}
.party-row-name{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--text);}
.party-row-class{font-size:12px;color:var(--text-dim);margin-top:2px;}
.party-row-hp{font-size:12px;font-weight:600;margin-left:auto;flex-shrink:0;}

/* ── SCHEDA PERSONAGGIO ── */
.char-wrap{max-width:520px;margin:0 auto;}
.char-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.char-avatar{width:72px;height:72px;border-radius:50%;border:3px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:32px;background:var(--bg3);flex-shrink:0;}
.char-name{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--text);}
.char-sub{font-size:13px;color:var(--text-dim);margin-top:3px;}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{font-size:12px;font-weight:500;padding:7px 14px;border-radius:8px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;}
.tab-btn.active{background:var(--red);color:#fff;font-weight:600;}

/* SCHEDA tab */
.stat-block{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.stat-block-title{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--red2);margin-bottom:10px;}
.top-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.top-stat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
.top-stat-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);}
.top-stat-val{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--text);margin-top:3px;}

/* HP BAR */
.hp-block{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.hp-label{font-size:13px;color:var(--text-dim);margin-bottom:10px;}
.hp-controls{display:flex;align-items:center;gap:10px;}
.hp-btn{width:36px;height:36px;border-radius:50%;border:2px solid;background:transparent;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-weight:700;line-height:1;}
.hp-btn.minus{border-color:var(--red);color:var(--red);}
.hp-btn.minus:hover{background:rgba(192,57,43,.15);}
.hp-btn.plus{border-color:#22c55e;color:#22c55e;}
.hp-btn.plus:hover{background:rgba(34,197,94,.15);}
.hp-val{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:6px 14px;text-align:center;min-width:60px;}
.hp-max{font-size:13px;color:var(--text-dim);}
.hp-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:10px;}
.hp-bar-fill{height:100%;background:linear-gradient(90deg,var(--red-dim),var(--green));border-radius:3px;transition:width .3s;}

/* CARATTERISTICHE */
.caract-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.caract-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center;}
.caract-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);}
.caract-val{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--text);margin:3px 0;}
.caract-mod{font-size:11px;font-weight:600;color:var(--red2);}

/* ABILITÀ */
.abilita-list{display:flex;flex-direction:column;gap:4px;}
.abilita-row{display:flex;align-items:center;gap:8px;padding:5px 2px;}
.abilita-circle{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;flex-shrink:0;}
.abilita-circle.prof{background:var(--red2);border-color:var(--red2);}
.abilita-mod{font-size:13px;font-weight:600;color:var(--text);width:30px;}
.abilita-name{font-size:13px;color:var(--text-dim);flex:1;}
.abilita-right{width:28px;height:28px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;}

/* INVENTARIO / NOTE */
.tab-content{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.tab-content-empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px;font-style:italic;}
.item-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.item-row:last-child{border-bottom:none;}
.item-name{font-size:14px;color:var(--text);}
.item-detail{font-size:12px;color:var(--text-dim);}
.note-text{font-size:14px;color:var(--text-dim);line-height:1.75;font-style:italic;}

/* ── TOMO ── */
.tome-header{text-align:center;padding:16px 0 24px;}
.tome-title{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--red2);text-shadow:0 0 24px var(--red-glow);}
.tome-sub{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-top:4px;}
.tome-entry{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--red-dim);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.tome-entry-title{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
.tome-entry-text{font-size:13px;color:var(--text-dim);font-style:italic;line-height:1.65;}
.locked-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--red-dim);border:1px solid var(--red-dim);border-radius:5px;padding:2px 8px;margin-top:6px;}

/* ── MAPPA ── */
.map-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;height:420px;position:relative;overflow:hidden;}
.map-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(192,57,43,.07) 0%,transparent 50%),repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(192,57,43,.02) 40px,rgba(192,57,43,.02) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(192,57,43,.02) 40px,rgba(192,57,43,.02) 41px);}
.map-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.map-hint{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);}
.map-pin{position:absolute;cursor:pointer;transition:transform .18s;}
.map-pin:hover{transform:scale(1.2);}
.map-pin-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--red2);background:rgba(192,57,43,.35);box-shadow:0 0 8px var(--red-glow);}
.map-pin-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--red2);text-align:center;margin-top:3px;white-space:nowrap;text-shadow:0 1px 4px #000;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:500px;width:94%;max-height:88vh;overflow-y:auto;box-shadow:0 0 40px rgba(192,57,43,.12);}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--red2);}
.modal-close{background:none;border:none;font-size:20px;color:var(--text-dim);cursor:pointer;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:18px 20px;}
.modal-footer{padding:12px 20px 18px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);}
.form-group{margin-bottom:13px;}
.form-label{display:block;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:8px 12px;outline:none;transition:border-color .18s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--red-dim);}
.form-textarea{min-height:88px;resize:vertical;}
.form-select{cursor:pointer;}
.form-select option{background:var(--bg2);}
.btn-modal{font-size:12px;font-weight:600;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .18s;}
.btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--text-dim);}
.btn-cancel:hover{border-color:var(--border);color:var(--text);}
.btn-save{background:var(--red);border:none;color:#fff;}
.btn-save:hover{background:var(--red2);}

/* ── PIN ── */
.pin-dots{display:flex;gap:12px;justify-content:center;margin:14px 0;}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s;}
.pin-dot.filled{background:var(--red2);border-color:var(--red2);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:210px;margin:0 auto;}
.pin-key{background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:18px;font-weight:500;padding:13px 0;cursor:pointer;transition:all .15s;text-align:center;}
.pin-key:hover{background:rgba(192,57,43,.15);border-color:var(--red-dim);color:var(--red2);}
.pin-key:active{transform:scale(.93);}
.pin-error{text-align:center;font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--red2);margin-top:8px;min-height:16px;}

/* ── MOBILE ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:49;backdrop-filter:blur(3px);}
.sidebar-overlay.open{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.view{animation:fadeIn .2s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .3s ease;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
@media(max-width:640px){
  .menu-toggle{display:flex;}
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:50;width:270px;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(0,0,0,.7);}
  .sidebar.open{transform:translateX(0);}
  .sessions-grid,.world-grid,.arcane-grid{grid-template-columns:1fr;}
  .caract-grid{grid-template-columns:repeat(3,1fr);}
  .top-stats{grid-template-columns:1fr 1fr 1fr;}
}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="campaign-logo">
      <div class="campaign-orb"></div>
      <div>
        <div class="campaign-title">House Valerius</div>
        <div class="campaign-sub">DM · Dungeon Master</div>
      </div>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sec-label">La Campagna</div>
    <div class="nav-item" onclick="nav('sessioni',this)"><span class="nav-icon">📜</span>Sessioni</div>
    <div class="nav-item" onclick="nav('npc',this)"><span class="nav-icon">👤</span>NPC</div>
    <div class="nav-item" onclick="nav('mappa',this)"><span class="nav-icon">🗺️</span>Mappa</div>
    <div class="nav-item" onclick="nav('fazioni',this)"><span class="nav-icon">⚔️</span>Fazioni</div>
    <div class="nav-item active" onclick="nav('mondo',this)"><span class="nav-icon">🌍</span>Fogli del Mondo</div>
    <div class="nav-item" onclick="nav('cronologia',this)"><span class="nav-icon">⏳</span>Cronologia</div>
    <div class="nav-item" onclick="nav('arcano',this)"><span class="nav-icon">✨</span>Compendio Arcano</div>
    <div class="nav-item" onclick="nav('party',this)"><span class="nav-icon">🛡️</span>Party</div>
  </div>
  <div class="divider"></div>
  <div class="sidebar-section">
    <div class="sec-label" style="color:var(--red-dim)">Segreti</div>
    <div class="nav-item" onclick="nav('tomo',this)"><span class="nav-icon">🔒</span>Tomo Segreto</div>
  </div>
  <div class="divider"></div>
  <div class="sidebar-section">
    <div class="sec-label">La Compagnia</div>
    <div class="nav-item" onclick="nav('minerva',this)"><span class="player-dot" style="background:#c084fc"></span>Minerva</div>
    <div class="nav-item" onclick="nav('talia',this)"><span class="player-dot" style="background:#fb923c"></span>Talia</div>
  </div>
</aside>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar-orb"></div>
      <span class="page-title" id="pageTitle">Fogli del Mondo</span>
    </div>
    <div class="topbar-right">
      <button class="btn-dm" id="dmBtn" onclick="toggleDm()">🔐 DM</button>
      <button class="btn-add" onclick="isAuth?openAdd():toggleDm()">+ Aggiungi</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</main>
</div>

<!-- NPC PANEL -->
<div class="npc-panel" id="npcPanel">
  <div class="npc-backdrop" onclick="closeNpc()"></div>
  <div class="npc-sheet" id="npcSheet"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Aggiungi</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-modal btn-cancel" onclick="closeModal()">Annulla</button>
      <button class="btn-modal btn-save" onclick="saveModal()">Salva</button>
    </div>
  </div>
</div>

<!-- PIN MODAL -->
<div class="modal-overlay" id="pinModal">
  <div class="modal" style="max-width:290px">
    <div class="modal-header">
      <span class="modal-title">🔐 Accesso DM</span>
      <button class="modal-close" onclick="closePinModal()">✕</button>
    </div>
    <div class="modal-body" style="text-align:center;padding:16px 20px 8px">
      <div style="font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim)">Inserisci il PIN</div>
      <div class="pin-dots">
        <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-keypad">
        <button class="pin-key" onclick="pp('1')">1</button><button class="pin-key" onclick="pp('2')">2</button><button class="pin-key" onclick="pp('3')">3</button>
        <button class="pin-key" onclick="pp('4')">4</button><button class="pin-key" onclick="pp('5')">5</button><button class="pin-key" onclick="pp('6')">6</button>
        <button class="pin-key" onclick="pp('7')">7</button><button class="pin-key" onclick="pp('8')">8</button><button class="pin-key" onclick="pp('9')">9</button>
        <button class="pin-key" onclick="pinClr()" style="font-size:11px">CLR</button>
        <button class="pin-key" onclick="pp('0')">0</button>
        <button class="pin-key" onclick="pinBack()" style="font-size:16px">⌫</button>
      </div>
      <div class="pin-error" id="pinError"></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const DM_PIN = '1234'; // ← cambia qui il tuo PIN

// ── DATA ──
const data = {
  sessioni:[],
  npc:[],
  fazioni:[],
  mondo:[],
  cronologia:[],
  arcano:[],
  party:[
    {name:'Minerva',sub:'· Livello 1',color:'#c084fc',icon:'🔮',
     ca:0,livello:1,background:'',hp:0,hpMax:0,
     for:10,des:10,cos:10,int:10,sag:10,car:10,
     inventario:[],incantesimi:[],note:'',famigli:''},
    {name:'Talia',sub:'· Livello 1',color:'#fb923c',icon:'⚔️',
     ca:0,livello:1,background:'',hp:0,hpMax:0,
     for:10,des:10,cos:10,int:10,sag:10,car:10,
     inventario:[],incantesimi:[],note:'',famigli:''},
  ],
  tomo:[],
};

// ── STATE ──
let curView='mondo', isAuth=false, pinCb=null, pinVal='';
let editView=null, editIdx=null;
const TITLES={sessioni:'Sessioni',npc:'NPC',mappa:'Mappa',fazioni:'Fazioni',mondo:'Fogli del Mondo',cronologia:'Cronologia',arcano:'Compendio Arcano',party:'Party',tomo:'Tomo Segreto',minerva:'Minerva',talia:'Talia'};

// ── SIDEBAR ──
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');}

// ── NAV ──
function nav(view,el){
  curView=view; closeSidebar();
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('pageTitle').textContent=TITLES[view]||view;
  const c=document.getElementById('content');
  c.innerHTML=render(view);
  if(isAuth)c.classList.add('dm-mode');
}

function render(v){
  switch(v){
    case 'sessioni':   return rSessioni();
    case 'npc':        return rNpc();
    case 'mappa':      return rMappa();
    case 'fazioni':    return rFazioni();
    case 'mondo':      return rMondo();
    case 'cronologia': return rCronologia();
    case 'arcano':     return rArcano();
    case 'party':      return rParty();
    case 'tomo':       return rTomo();
    case 'minerva':    return rChar('Minerva');
    case 'talia':      return rChar('Talia');
    default: return empty('In costruzione');
  }
}

function empty(msg){return `<div class="empty-state"><div class="empty-icon">📜</div><div class="empty-title">${msg}</div></div>`;}
function eBtn(v,i){return `<button class="btn-edit" onclick="openEdit('${v}',${i})">✏ Modifica</button><button class="btn-delete" onclick="delItem('${v}',${i})">✕</button>`;}

// ── RENDERERS ──
function rSessioni(){
  if(!data.sessioni.length) return empty('Nessuna sessione ancora');
  return `<div class="view sessions-grid">${data.sessioni.map((s,i)=>`
    <div class="session-card">
      <div class="session-num">Sessione ${s.num||i+1}</div>
      <div class="session-title">${s.title}</div>
      <div class="session-excerpt">${s.excerpt}</div>
      <div class="session-date">${s.date}</div>
      <div class="card-actions">${eBtn('sessioni',i)}</div>
    </div>`).join('')}</div>`;
}

function rNpc(){
  if(!data.npc.length) return empty('Nessun NPC ancora');
  return `<div class="view npc-grid">${data.npc.map((n,i)=>`
    <div class="npc-row" onclick="openNpc(${i})">
      <div class="npc-portrait">${n.img?`<img src="${n.img}">`:(n.icon||'👤')}</div>
      <div class="npc-info">
        <div class="npc-name">${n.name}</div>
        <div class="npc-role-txt">${n.role}</div>
        <div class="npc-tags">
          <span class="tag ${n.tag}">${n.tag}</span>
          ${n.stato?`<span class="tag ${n.stato}">${n.stato}</span>`:''}
        </div>
      </div>
      <div class="card-actions" style="margin-top:0;border:none;padding:0;flex-direction:column">${eBtn('npc',i)}</div>
    </div>`).join('')}</div>`;
}

function openNpc(i){
  const n=data.npc[i];
  document.getElementById('npcSheet').innerHTML=`
    <div class="npc-sheet-header">
      <div class="npc-sheet-name">${n.name}</div>
      <button class="npc-close" onclick="closeNpc()">✕</button>
    </div>
    <div class="npc-divider"></div>
    <div class="npc-img-wrap">
      ${n.img?`<img src="${n.img}">`:`<div class="npc-img-placeholder">${n.icon||'👤'}</div>`}
    </div>
    <div class="npc-sheet-body">
      <div class="npc-sheet-tags">
        <span class="tag ${n.tag}">${n.tag}</span>
        ${n.stato?`<span class="tag ${n.stato}">${n.stato}</span>`:''}
      </div>
      <div class="npc-sheet-ruolo">${n.role}</div>
      ${n.primo?`<div class="npc-sheet-primo"><strong>Primo incontro:</strong> <span>${n.primo}</span></div>`:''}
      <div class="npc-sheet-desc">${n.desc||''}</div>
    </div>`;
  document.getElementById('npcPanel').classList.add('open');
}
function closeNpc(){document.getElementById('npcPanel').classList.remove('open');}

function rMappa(){
  return `<div class="view">
    <div class="map-wrap">
      <div class="map-center"><div class="map-hint">Carica mappa personalizzata</div></div>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="btn-add" onclick="isAuth?openAdd():toggleDm()" style="font-size:12px">+ Aggiungi Luogo</button>
    </div>
  </div>`;
}

function rFazioni(){
  if(!data.fazioni.length) return empty('Nessuna fazione ancora');
  return `<div class="view faction-list">${data.fazioni.map((f,i)=>`
    <div class="faction-card">
      <div class="faction-icon">${f.icon||'⚔️'}</div>
      <div style="flex:1">
        <div class="faction-name">${f.name}</div>
        <div class="faction-desc">${f.desc}</div>
        <div class="influence-bar"><div class="influence-fill" style="width:${f.influence||0}%"></div></div>
        <div class="influence-lbl">Influenza: ${f.influence||0}%</div>
        <div class="card-actions">${eBtn('fazioni',i)}</div>
      </div>
    </div>`).join('')}</div>`;
}

function rMondo(){
  if(!data.mondo.length) return empty('Nessun luogo ancora');
  return `<div class="view world-grid">${data.mondo.map((w,i)=>`
    <div class="world-card">
      <div class="world-card-img">${w.icon||'🌍'}</div>
      <div class="world-card-body">
        <div class="world-card-title">${w.name}</div>
        <div class="world-card-sub">${w.sub}</div>
        <div class="card-actions">${eBtn('mondo',i)}</div>
      </div>
    </div>`).join('')}</div>`;
}

function rCronologia(){
  if(!data.cronologia.length) return empty('Nessun evento ancora');
  return `<div class="view"><div class="timeline">${data.cronologia.map((c,i)=>`
    <div class="tl-item">
      <div class="tl-date">${c.date}</div>
      <div class="tl-title">${c.title}</div>
      <div class="tl-desc">${c.desc}</div>
      <div class="card-actions" style="border:none;padding-top:4px">${eBtn('cronologia',i)}</div>
    </div>`).join('')}</div></div>`;
}

function rArcano(){
  if(!data.arcano.length) return empty('Nessun elemento arcano ancora');
  return `<div class="view arcane-grid">${data.arcano.map((a,i)=>`
    <div class="arcane-card">
      <div class="arcane-icon">${a.icon||'✨'}</div>
      <div class="arcane-name">${a.name}</div>
      <div class="arcane-school">${a.school}</div>
      <div class="arcane-desc">${a.desc}</div>
      <div class="card-actions" style="justify-content:center">${eBtn('arcano',i)}</div>
    </div>`).join('')}</div>`;
}

function rParty(){
  if(!data.party.length) return empty('Nessun personaggio');
  return `<div class="view party-list">${data.party.map((p,i)=>`
    <div class="party-row" onclick="nav('${p.name.toLowerCase()}',null)">
      <div class="party-row-avatar" style="border-color:${p.color}">${p.icon||'🛡️'}</div>
      <div>
        <div class="party-row-name">${p.name}</div>
        <div class="party-row-class">${p.sub}</div>
      </div>
      <div class="party-row-hp" style="color:${p.color}">HP ${p.hp}/${p.hpMax}</div>
    </div>`).join('')}</div>`;
}

function rTomo(){
  return `<div class="view"><div class="tome-header"><div class="tome-title">Tomo Segreto</div><div class="tome-sub">Solo DM</div></div>
    ${data.tomo.length?data.tomo.map((t,i)=>`
    <div class="tome-entry">
      <div class="tome-entry-title">${t.title}</div>
      ${t.locked?`<div class="tome-entry-text">[SIGILLATO]</div><span class="locked-badge">🔒 Bloccato</span>`:`<div class="tome-entry-text">${t.text}</div>`}
      <div class="card-actions" style="border:none;padding-top:6px">${eBtn('tomo',i)}</div>
    </div>`).join(''):empty('Nessun segreto ancora')}
  </div>`;
}

// ── SCHEDA PERSONAGGIO ──
let charTab={};
function rChar(nome){
  const i=data.party.findIndex(p=>p.name.toLowerCase()===nome.toLowerCase());
  if(i<0) return empty('Personaggio non trovato');
  const p=data.party[i];
  const t=charTab[nome]||'scheda';
  const mod=v=>v?Math.floor((v-10)/2):0;
  const fmtMod=v=>(v>=0?'+':'')+v;
  const abil=[
    {n:'Acrobazia',stat:'des'},{n:'Addestrare animali',stat:'sag'},{n:'Arcano',stat:'int'},
    {n:'Atletica',stat:'for'},{n:'Furtività',stat:'des'},{n:'Indagare',stat:'int'},
    {n:'Inganno',stat:'car'},{n:'Intimidire',stat:'car'},{n:'Intuizione',stat:'sag'},
    {n:'Medicina',stat:'sag'},{n:'Natura',stat:'int'},{n:'Percezione',stat:'sag'},
    {n:'Performance',stat:'car'},{n:'Persuasione',stat:'car'},{n:'Rapidità di mano',stat:'des'},
    {n:'Religione',stat:'int'},{n:'Sopravvivenza',stat:'sag'},{n:'Storia',stat:'int'},
  ];
  const hpPct=p.hpMax>0?Math.max(0,Math.min(100,(p.hp/p.hpMax)*100)):0;
  const hpColor=hpPct>60?'var(--green)':hpPct>25?'var(--yellow)':'var(--red2)';

  const tabScheda=`
    <div class="top-stats">
      <div class="top-stat"><div class="top-stat-lbl">CA</div><div class="top-stat-val">${p.ca||0}</div></div>
      <div class="top-stat"><div class="top-stat-lbl">Livello</div><div class="top-stat-val">${p.livello||1}</div></div>
      <div class="top-stat"><div class="top-stat-lbl">Background</div><div class="top-stat-val" style="font-size:14px;margin-top:5px">${p.background||'—'}</div></div>
    </div>
    <div class="hp-block">
      <div class="hp-label">Punti Ferita</div>
      <div class="hp-controls">
        <button class="hp-btn minus" onclick="adjustHp('${nome}',-1)">−</button>
        <div class="hp-val" id="hpVal_${nome}">${p.hp}</div>
        <div class="hp-max">/ ${p.hpMax}</div>
        <button class="hp-btn plus" onclick="adjustHp('${nome}',1)">+</button>
      </div>
      <div class="hp-bar"><div class="hp-bar-fill" id="hpBar_${nome}" style="width:${hpPct}%;background:${hpColor}"></div></div>
    </div>
    <div class="stat-block">
      <div class="stat-block-title">Caratteristiche</div>
      <div class="caract-grid">
        ${['for','des','cos','int','sag','car'].map(s=>`
        <div class="caract-box">
          <div class="caract-lbl">${s.toUpperCase()}</div>
          <div class="caract-val">${p[s]||10}</div>
          <div class="caract-mod">${fmtMod(mod(p[s]||10))}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="stat-block">
      <div class="stat-block-title">Abilità <span style="float:right;font-weight:400;color:var(--text-muted)">comp +${Math.ceil((p.livello||1)/4)+1}</span></div>
      <div class="abilita-list">
        ${abil.map(a=>`
        <div class="abilita-row">
          <div class="abilita-circle"></div>
          <div class="abilita-mod">${fmtMod(mod(p[a.stat]||10))}</div>
          <div class="abilita-name">${a.n}</div>
          <div class="abilita-right">—</div>
        </div>`).join('')}
      </div>
    </div>`;

  const tabInv=`<div class="tab-content">${p.inventario&&p.inventario.length?p.inventario.map(x=>`<div class="item-row"><div class="item-name">${x.name}</div><div class="item-detail">${x.detail||''}</div></div>`).join(''):'<div class="tab-content-empty">Inventario vuoto</div>'}</div>`;
  const tabInc=`<div class="tab-content">${p.incantesimi&&p.incantesimi.length?p.incantesimi.map(x=>`<div class="item-row"><div class="item-name">${x.name}</div><div class="item-detail">${x.detail||''}</div></div>`).join(''):'<div class="tab-content-empty">Nessun incantesimo</div>'}</div>`;
  const tabFam=`<div class="tab-content">${p.famigli?`<div class="note-text">${p.famigli}</div>`:'<div class="tab-content-empty">Nessun famiglio</div>'}</div>`;
  const tabNote=`<div class="tab-content">${p.note?`<div class="note-text">${p.note}</div>`:'<div class="tab-content-empty">Nessuna nota</div>'}</div>`;

  const tabContent={scheda:tabScheda,inventario:tabInv,incantesimi:tabInc,famigli:tabFam,'note session':tabNote};

  return `<div class="view char-wrap">
    <div class="char-header">
      <div class="char-avatar" style="border-color:${p.color}">${p.icon||'🛡️'}</div>
      <div>
        <div class="char-name">${p.name}</div>
        <div class="char-sub">${p.sub||'· Livello 1'}</div>
      </div>
    </div>
    <div class="tabs">
      ${['scheda','incantesimi','inventario','famigli','note session'].map(tb=>`
      <button class="tab-btn ${t===tb?'active':''}" onclick="setTab('${nome}','${tb}')">${tb}</button>`).join('')}
    </div>
    <div id="tabContent_${nome}">${tabContent[t]||tabScheda}</div>
    <div class="card-actions" style="justify-content:center;margin-top:12px">${eBtn('party',i)}</div>
  </div>`;
}

function setTab(nome,tab){
  charTab[nome]=tab;
  document.getElementById('content').innerHTML=render(nome);
  if(isAuth)document.getElementById('content').classList.add('dm-mode');
}

function adjustHp(nome,delta){
  const i=data.party.findIndex(p=>p.name.toLowerCase()===nome.toLowerCase());
  if(i<0)return;
  data.party[i].hp=Math.max(0,Math.min(data.party[i].hpMax||999,data.party[i].hp+delta));
  const p=data.party[i];
  const pct=p.hpMax>0?Math.max(0,Math.min(100,(p.hp/p.hpMax)*100)):0;
  const col=pct>60?'var(--green)':pct>25?'var(--yellow)':'var(--red2)';
  const vEl=document.getElementById('hpVal_'+nome);
  const bEl=document.getElementById('hpBar_'+nome);
  if(vEl)vEl.textContent=p.hp;
  if(bEl){bEl.style.width=pct+'%';bEl.style.background=col;}
}

// ── DM / PIN ──
function toggleDm(){
  if(isAuth){logoutDm();return;}
  pinCb=enterDm; pinVal='';
  updateDots(); document.getElementById('pinError').textContent='';
  document.getElementById('pinModal').classList.add('open');
}
function enterDm(){
  isAuth=true;
  document.getElementById('dmBtn').textContent='🔓 DM';
  document.getElementById('dmBtn').classList.add('active');
  document.getElementById('content').classList.add('dm-mode');
}
function logoutDm(){
  isAuth=false;
  document.getElementById('dmBtn').textContent='🔐 DM';
  document.getElementById('dmBtn').classList.remove('active');
  document.getElementById('content').classList.remove('dm-mode');
}
function closePinModal(){document.getElementById('pinModal').classList.remove('open');pinVal='';updateDots();}
function pp(d){
  if(pinVal.length>=4)return;
  pinVal+=d; updateDots();
  if(pinVal.length===4){
    setTimeout(()=>{
      if(pinVal===DM_PIN){closePinModal();if(pinCb){pinCb();pinCb=null;}}
      else{
        const m=document.getElementById('pinModal').querySelector('.modal');
        m.classList.add('shake');setTimeout(()=>m.classList.remove('shake'),350);
        document.getElementById('pinError').textContent='PIN errato';
        pinVal='';updateDots();
      }
    },80);
  }
}
function pinBack(){pinVal=pinVal.slice(0,-1);updateDots();document.getElementById('pinError').textContent='';}
function pinClr(){pinVal='';updateDots();document.getElementById('pinError').textContent='';}
function updateDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('filled',i<pinVal.length);}

// ── MODAL ADD/EDIT ──
const FIELDS={
  sessioni:[{id:'num',l:'Numero',ph:'es. I'},{id:'title',l:'Titolo',ph:'Titolo...'},{id:'date',l:'Data',ph:'es. 1 Gen 2025'},{id:'excerpt',l:'Riassunto',ph:'Cosa è successo...',ta:true}],
  npc:[{id:'name',l:'Nome',ph:'Nome'},{id:'role',l:'Ruolo',ph:'es. Mercante'},{id:'icon',l:'Icona',ph:'👤'},{id:'desc',l:'Descrizione',ph:'Chi è?',ta:true},{id:'primo',l:'Primo incontro',ph:'es. Aldermoor'},{id:'img',l:'URL Immagine',ph:'https://...'},{id:'tag',l:'Relazione',sel:['neutrale','alleato','nemico','sconosciuto']},{id:'stato',l:'Stato',sel:['vivo','morto','']}],
  fazioni:[{id:'name',l:'Nome',ph:'Nome'},{id:'icon',l:'Icona',ph:'⚔️'},{id:'desc',l:'Descrizione',ph:'...',ta:true},{id:'influence',l:'Influenza %',ph:'0-100'}],
  mondo:[{id:'name',l:'Nome',ph:'Nome'},{id:'icon',l:'Icona',ph:'🏰'},{id:'sub',l:'Descrizione',ph:'...',ta:true}],
  cronologia:[{id:'date',l:'Data',ph:'Anno 1, Giorno X'},{id:'title',l:'Titolo',ph:'Evento...'},{id:'desc',l:'Descrizione',ph:'Cosa accadde...',ta:true}],
  arcano:[{id:'name',l:'Nome',ph:'Nome'},{id:'icon',l:'Icona',ph:'✨'},{id:'school',l:'Scuola',ph:'Proibito'},{id:'desc',l:'Descrizione',ph:'...',ta:true}],
  party:[
    {id:'name',l:'Nome',ph:'Nome'},{id:'sub',l:'Classe',ph:'Guerriero · Lv 1'},{id:'icon',l:'Icona',ph:'🛡️'},{id:'color',l:'Colore',ph:'#c084fc'},
    {id:'ca',l:'CA',ph:'15'},{id:'livello',l:'Livello',ph:'1'},{id:'background',l:'Background',ph:'Soldato'},
    {id:'hp',l:'HP Attuali',ph:'0'},{id:'hpMax',l:'HP Massimi',ph:'10'},
    {id:'for',l:'Forza',ph:'10'},{id:'des',l:'Destrezza',ph:'10'},{id:'cos',l:'Costituzione',ph:'10'},
    {id:'int',l:'Intelligenza',ph:'10'},{id:'sag',l:'Saggezza',ph:'10'},{id:'car',l:'Carisma',ph:'10'},
    {id:'note',l:'Note',ph:'...',ta:true},
  ],
  tomo:[{id:'title',l:'Titolo',ph:'Segreto...'},{id:'text',l:'Contenuto',ph:'...',ta:true},{id:'locked',l:'Bloccato?',sel:['false','true']}],
};

function buildForm(view,obj){
  const fields=FIELDS[view]||[{id:'name',l:'Nome',ph:''},{id:'desc',l:'Descrizione',ph:'',ta:true}];
  return fields.map(f=>{
    const val=obj&&obj[f.id]!==undefined?obj[f.id]:'';
    if(f.sel)return `<div class="form-group"><label class="form-label">${f.l}</label><select class="form-select" id="ff_${f.id}">${f.sel.map(o=>`<option value="${o}"${String(val)===o?' selected':''}>${o||'—'}</option>`).join('')}</select></div>`;
    if(f.ta)return `<div class="form-group"><label class="form-label">${f.l}</label><textarea class="form-textarea" id="ff_${f.id}" placeholder="${f.ph}">${val}</textarea></div>`;
    return `<div class="form-group"><label class="form-label">${f.l}</label><input class="form-input" id="ff_${f.id}" placeholder="${f.ph}" value="${val}"></div>`;
  }).join('');
}

function openAdd(){
  editView=curView; editIdx=null;
  document.getElementById('modalTitle').textContent='Aggiungi';
  document.getElementById('modalBody').innerHTML=buildForm(curView,null);
  document.getElementById('modal').classList.add('open');
}
function openEdit(view,idx){
  editView=view; editIdx=idx;
  document.getElementById('modalTitle').textContent='Modifica';
  document.getElementById('modalBody').innerHTML=buildForm(view,data[view][idx]);
  document.getElementById('modal').classList.add('open');
}
function saveModal(){
  const v=editView||curView;
  const fields=FIELDS[v]||[{id:'name'},{id:'desc'}];
  const obj={};
  fields.forEach(f=>{
    const el=document.getElementById('ff_'+f.id);
    if(!el)return;
    let val=el.value;
    if(['influence','hp','hpMax','ca','livello','for','des','cos','int','sag','car'].includes(f.id))val=parseInt(val)||0;
    if(f.id==='locked')val=val==='true';
    obj[f.id]=val;
  });
  if(editIdx!==null)Object.assign(data[v][editIdx],obj);
  else data[v].push(obj);
  closeModal();
  const c=document.getElementById('content');
  c.innerHTML=render(v);
  if(isAuth)c.classList.add('dm-mode');
}
function delItem(v,i){
  if(!confirm('Eliminare?'))return;
  data[v].splice(i,1);
  const c=document.getElementById('content');
  c.innerHTML=render(curView);
  if(isAuth)c.classList.add('dm-mode');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editView=null;editIdx=null;}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('pinModal').addEventListener('click',e=>{if(e.target===document.getElementById('pinModal'))closePinModal();});

// ── INIT ──
document.getElementById('content').innerHTML=render('mondo');
