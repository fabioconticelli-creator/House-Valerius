<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Minerva — House Valerius</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0b14; --bg2:#13101a; --bg3:#1a1624; --bg4:#201c2e;
  --border:#2a2040; --border2:#332848;
  --red:#c0392b; --red2:#e74c3c; --red-dim:#7a1a1a;
  --purple:#c084fc; --purple-dim:#7c3aed;
  --text:#e8e0f0; --text-dim:#8a7fa0; --text-muted:#4a4060;
  --green:#22c55e; --yellow:#eab308;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

/* LOGIN */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-orb{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--purple),var(--purple-dim));box-shadow:0 0 40px rgba(192,132,252,.4);margin-bottom:20px;}
.login-name{font-family:'Cinzel',serif;font-size:28px;font-weight:700;color:var(--text);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text-muted);margin-bottom:32px;letter-spacing:.08em;}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:320px;}
.login-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:8px;}
.login-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;padding:12px 14px;outline:none;margin-bottom:14px;}
.login-input:focus{border-color:var(--purple);}
.login-btn{width:100%;background:var(--purple-dim);color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:13px;cursor:pointer;}
.login-btn:hover{background:var(--purple);}
.login-err{font-size:12px;color:var(--red2);text-align:center;margin-top:10px;min-height:16px;}

/* APP */
.app{display:none;flex-direction:column;min-height:100vh;}
.app.visible{display:flex;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-orb{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--purple),var(--purple-dim));box-shadow:0 0 12px rgba(192,132,252,.4);}
.topbar-name{font-family:'Cinzel',serif;font-size:16px;font-weight:600;color:var(--purple);}
.logout-btn{font-size:11px;padding:5px 12px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text-muted);cursor:pointer;}

.content{padding:20px;max-width:520px;margin:0 auto;width:100%;}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{font-size:12px;font-weight:500;padding:7px 13px;border-radius:8px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Inter',sans-serif;}
.tab-btn.active{background:var(--purple-dim);color:#fff;font-weight:600;}

/* HEADER */
.char-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.char-avatar{width:72px;height:72px;border-radius:50%;border:3px solid var(--purple);display:flex;align-items:center;justify-content:center;font-size:32px;background:var(--bg3);flex-shrink:0;}
.char-name{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--text);}
.char-sub{font-size:13px;color:var(--text-dim);margin-top:3px;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.card-title{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--purple);margin-bottom:10px;}

/* TOP STATS */
.top-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);}
.stat-val{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--text);margin-top:3px;}
.stat-val.sm{font-size:13px;margin-top:5px;}

/* HP */
.hp-controls{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.hp-btn{width:38px;height:38px;border-radius:50%;border:2px solid;background:transparent;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1;font-family:'Inter',sans-serif;}
.hp-btn.minus{border-color:var(--red);color:var(--red);}
.hp-btn.plus{border-color:var(--green);color:var(--green);}
.hp-display{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:6px 14px;min-width:60px;text-align:center;}
.hp-max{font-size:13px;color:var(--text-dim);}
.hp-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.hp-bar-fill{height:100%;border-radius:3px;transition:width .3s;}

/* CARATTERISTICHE */
.caract-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.caract-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center;}
.caract-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);}
.caract-val{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--text);margin:3px 0;}
.caract-mod{font-size:11px;font-weight:600;color:var(--purple);}

/* ABILITÀ */
.abil-row{display:flex;align-items:center;gap:8px;padding:5px 2px;}
.abil-circle{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;}
.abil-mod{font-size:13px;font-weight:600;color:var(--text);width:30px;}
.abil-name{font-size:13px;color:var(--text-dim);flex:1;}

/* NOTE */
.note-textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:12px;outline:none;resize:vertical;min-height:200px;line-height:1.7;}
.note-textarea:focus{border-color:var(--purple);}
.save-btn{width:100%;background:var(--purple-dim);color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:12px;cursor:pointer;margin-top:10px;}
.save-btn:hover{background:var(--purple);}
.save-ok{text-align:center;font-size:12px;color:var(--green);margin-top:6px;min-height:16px;}

.empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px;font-style:italic;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginScreen">
  <div class="login-orb"></div>
  <div class="login-name">Minerva</div>
  <div class="login-sub">House Valerius · Giocatore</div>
  <div class="login-box">
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entra</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appScreen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-orb"></div>
      <span class="topbar-name" id="tabTitle">Scheda</span>
    </div>
    <button class="logout-btn" onclick="logout()">Esci</button>
  </div>

  <div class="content">
    <div class="char-header">
      <div class="char-avatar">🔮</div>
      <div>
        <div class="char-name">Minerva</div>
        <div class="char-sub" id="charSub">· Livello 1</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="setTab('scheda',this)">scheda</button>
      <button class="tab-btn" onclick="setTab('incantesimi',this)">incantesimi</button>
      <button class="tab-btn" onclick="setTab('inventario',this)">inventario</button>
      <button class="tab-btn" onclick="setTab('famigli',this)">famigli</button>
      <button class="tab-btn" onclick="setTab('note',this)">note session</button>
    </div>

    <div id="tabContent"></div>
  </div>
</div>

<script>
const PASSWORD = 'minerva123'; // ← cambia questa password
const STORAGE_KEY = 'minerva_data';

const ABILITA = [
  {n:'Acrobazia',s:'des'},{n:'Addestrare animali',s:'sag'},{n:'Arcano',s:'int'},
  {n:'Atletica',s:'for'},{n:'Furtività',s:'des'},{n:'Indagare',s:'int'},
  {n:'Inganno',s:'car'},{n:'Intimidire',s:'car'},{n:'Intuizione',s:'sag'},
  {n:'Medicina',s:'sag'},{n:'Natura',s:'int'},{n:'Percezione',s:'sag'},
  {n:'Performance',s:'car'},{n:'Persuasione',s:'car'},{n:'Rapidità di mano',s:'des'},
  {n:'Religione',s:'int'},{n:'Sopravvivenza',s:'sag'},{n:'Storia',s:'int'},
];

const defaultData = {
  ca:0, livello:1, background:'', hp:0, hpMax:0,
  for:10, des:10, cos:10, int:10, sag:10, car:10,
  note:'', inventario:'', incantesimi:'', famigli:''
};

let char = {...defaultData};
let curTab = 'scheda';

function load(){ const d=localStorage.getItem(STORAGE_KEY); if(d) char={...defaultData,...JSON.parse(d)}; }
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(char)); }

const mod = v => Math.floor(((v||10)-10)/2);
const fmt = v => (v>=0?'+':'')+v;

function doLogin(){
  const val = document.getElementById('pwInput').value;
  if(val === PASSWORD){
    load();
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').classList.add('visible');
    renderTab(curTab);
  } else {
    document.getElementById('loginErr').textContent = 'Password errata. Riprova.';
    document.getElementById('pwInput').value='';
  }
}

function logout(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').textContent='';
}

function setTab(tab, el){
  curTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('tabTitle').textContent = tab==='note'?'Note Session':tab.charAt(0).toUpperCase()+tab.slice(1);
  renderTab(tab);
}

function adjustHp(delta){
  char.hp = Math.max(0, Math.min(char.hpMax||999, char.hp+delta));
  save();
  const pct = char.hpMax>0 ? Math.max(0,Math.min(100,(char.hp/char.hpMax)*100)) : 0;
  const col = pct>60?'#22c55e':pct>25?'#eab308':'#e74c3c';
  const el=document.getElementById('hpVal'); if(el) el.textContent=char.hp;
  const bar=document.getElementById('hpBar'); if(bar){bar.style.width=pct+'%';bar.style.background=col;}
}

function saveNote(field){
  const el=document.getElementById('noteArea');
  if(el){ char[field]=el.value; save(); }
  document.getElementById('saveOk').textContent='✓ Salvato';
  setTimeout(()=>{const s=document.getElementById('saveOk');if(s)s.textContent='';},2000);
}

function renderTab(tab){
  const c = document.getElementById('tabContent');
  const pct = char.hpMax>0 ? Math.max(0,Math.min(100,(char.hp/char.hpMax)*100)) : 0;
  const hpCol = pct>60?'#22c55e':pct>25?'#eab308':'#e74c3c';

  if(tab==='scheda'){
    c.innerHTML = `
      <div class="top-stats">
        <div class="stat-box"><div class="stat-lbl">CA</div><div class="stat-val">${char.ca||0}</div></div>
        <div class="stat-box"><div class="stat-lbl">Livello</div><div class="stat-val">${char.livello||1}</div></div>
        <div class="stat-box"><div class="stat-lbl">Background</div><div class="stat-val sm">${char.background||'—'}</div></div>
      </div>
      <div class="card">
        <div style="font-size:13px;color:var(--text-dim);margin-bottom:10px">Punti Ferita</div>
        <div class="hp-controls">
          <button class="hp-btn minus" onclick="adjustHp(-1)">−</button>
          <div class="hp-display" id="hpVal">${char.hp}</div>
          <div class="hp-max">/ ${char.hpMax}</div>
          <button class="hp-btn plus" onclick="adjustHp(1)" style="margin-left:auto">+</button>
        </div>
        <div class="hp-bar"><div class="hp-bar-fill" id="hpBar" style="width:${pct}%;background:${hpCol}"></div></div>
      </div>
      <div class="card">
        <div class="card-title">Caratteristiche</div>
        <div class="caract-grid">
          ${['for','des','cos','int','sag','car'].map(s=>`
          <div class="caract-box">
            <div class="caract-lbl">${s.toUpperCase()}</div>
            <div class="caract-val">${char[s]||10}</div>
            <div class="caract-mod">${fmt(mod(char[s]||10))}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-title">Abilità <span style="float:right;font-weight:400;color:var(--text-muted)">comp +${Math.ceil((char.livello||1)/4)+1}</span></div>
        ${ABILITA.map(a=>`
        <div class="abil-row">
          <div class="abil-circle"></div>
          <div class="abil-mod">${fmt(mod(char[a.s]||10))}</div>
          <div class="abil-name">${a.n}</div>
        </div>`).join('')}
      </div>`;
  }

  else if(tab==='note'){
    c.innerHTML=`
      <div class="card">
        <div class="card-title">Note Sessione</div>
        <textarea class="note-textarea" id="noteArea" placeholder="Scrivi le tue note qui...">${char.note||''}</textarea>
        <button class="save-btn" onclick="saveNote('note')">💾 Salva note</button>
        <div class="save-ok" id="saveOk"></div>
      </div>`;
  }

  else if(tab==='inventario'){
    c.innerHTML=`
      <div class="card">
        <div class="card-title">Inventario</div>
        <textarea class="note-textarea" id="noteArea" placeholder="Elenca il tuo inventario...">${char.inventario||''}</textarea>
        <button class="save-btn" onclick="saveNote('inventario')">💾 Salva</button>
        <div class="save-ok" id="saveOk"></div>
      </div>`;
  }

  else if(tab==='incantesimi'){
    c.innerHTML=`
      <div class="card">
        <div class="card-title">Incantesimi</div>
        <textarea class="note-textarea" id="noteArea" placeholder="Elenca i tuoi incantesimi...">${char.incantesimi||''}</textarea>
        <button class="save-btn" onclick="saveNote('incantesimi')">💾 Salva</button>
        <div class="save-ok" id="saveOk"></div>
      </div>`;
  }

  else if(tab==='famigli'){
    c.innerHTML=`
      <div class="card">
        <div class="card-title">Famigli</div>
        <textarea class="note-textarea" id="noteArea" placeholder="Descrivi i tuoi famigli...">${char.famigli||''}</textarea>
        <button class="save-btn" onclick="saveNote('famigli')">💾 Salva</button>
        <div class="save-ok" id="saveOk"></div>
      </div>`;
  }
}
</script>
</body>
</html>
